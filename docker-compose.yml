services:
  postgres:
    image: postgres:18-alpine
    container_name: task-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        DATABASE_URL: postgresql://postgres:password@postgres:5432/task_management?schema=public

    volumes:
      - ./backend:/app
      - /app/node_modules

    container_name: task-backend
    restart: always

    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/task_management?schema=public

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    container_name: task-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data: